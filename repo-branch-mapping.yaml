version: 1

modules:
  data-assets:
    standard: dtstack
    repoProfileKey: dtstack-default
    archive:
      versioned: true
      titleField: requirement_title

  batch-works:
    standard: dtstack
    repoProfileKey: dtstack-default
    archive:
      versioned: true
      titleField: requirement_title

  data-query:
    standard: dtstack
    repoProfileKey: dtstack-default
    archive:
      versioned: true
      titleField: requirement_title

  variable-center:
    standard: dtstack
    repoProfileKey: dtstack-default
    archive:
      versioned: true
      titleField: requirement_title

  public-service:
    standard: dtstack
    repoProfileKey: dtstack-default
    archive:
      versioned: true
      titleField: requirement_title

repoProfiles:
  dtstack-default:
    backend:
      - repoKey: dt-center-assets
        role: asset-backend
        branchTemplate: "{branch}"
      - repoKey: DAGScheduleX
        role: scheduler-backend
        branchTemplate: "{branch}"
      - repoKey: datasourcex
        role: datasource-backend
        branchTemplate: "{branch}"
      - repoKey: dt-center-ide
        role: ide-backend
        branchTemplate: "{branch}"
      - repoKey: dt-public-service
        role: public-backend
        branchTemplate: "{branch}"
      - repoKey: engine-plugins
        role: engine-backend
        branchTemplate: "{branch}"
    frontend:
      - repoKey: dt-insight-studio-front
        role: asset-frontend
        branchTemplate: "{branch}"

  ltqc-custom:
    backend:
      - repoKey: dt-center-assets-custom
        role: asset-backend
        branchTemplate: "{branch}"
    frontend:
      - repoKey: dt-insight-studio-custom
        role: asset-frontend
        branchTemplate: "dataAssets/{branch}"

developmentVersionRules:
  - name: 6.3岚图定制化分支
    match:
      keywords:
        - "开发版本：6.3岚图定制化分支"
        - "开发版本: 6.3岚图定制化分支"
        - "6.3岚图定制化分支"
        - "岚图定制化分支"
    repoProfileKey: ltqc-custom
    branches:
      backend: release_6.3.x_ltqc
      frontend: release_6.3.x_ltqc
